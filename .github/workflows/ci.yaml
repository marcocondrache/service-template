name: ci
on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}-${{ github.ref_name == 'main' && github.sha || 'anysha' }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash -euxo pipefail {0}

jobs:
  style:
    name: style
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Install Rust
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: stable
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all --check
      - name: Check for typos
        uses: crate-ci/typos@3bc303c295c081add5df4a4d52a1e117f2fb2dce # master

  clippy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Install Rust
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: stable
          components: clippy
      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Run clippy
        run: cargo clippy --all -- -D warnings

  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Install Rust
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: stable
      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Install nextest
        uses: taiki-e/install-action@b265f9a422509a38f0c716115e5f17af22dfc631 # nextest
      - name: Build
        run: cargo build --verbose
      - name: Run tests
        run: cargo nextest run --verbose --no-tests=pass

  docs:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Install Rust
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: stable
      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - name: Check documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --no-deps --document-private-items

  machete:
    name: machete
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Install Rust
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # master
        with:
          toolchain: stable
      - name: Install cargo-machete
        uses: taiki-e/install-action@b810b9ca4c3f4a84d5c1cc0fa683a70c88077bab # cargo-machete
      - name: Check unused dependencies
        run: cargo machete

  tests_pass:
    name: tests pass
    needs: [style, clippy, test, docs, machete]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check job results
        run: |
          set +x
          EXIT_CODE=0

          check_result() {
            echo "* $1: $2"
            if [[ "$2" != "skipped" && "$2" != "success" ]]; then EXIT_CODE=1; fi
          }

          check_result "style" "$RESULT_STYLE"
          check_result "clippy" "$RESULT_CLIPPY"
          check_result "test" "$RESULT_TEST"
          check_result "docs" "$RESULT_DOCS"
          check_result "machete" "$RESULT_MACHETE"

          exit $EXIT_CODE
        env:
          RESULT_STYLE: ${{ needs.style.result }}
          RESULT_CLIPPY: ${{ needs.clippy.result }}
          RESULT_TEST: ${{ needs.test.result }}
          RESULT_DOCS: ${{ needs.docs.result }}
          RESULT_MACHETE: ${{ needs.machete.result }}
